<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwipo Resource Hub - Full Product Prototype</title>
  <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=BgPqLarVggfN9H1BTeelzEi9VhV3J5kl-Cq8uU6iGZBpfHPr3C_iY-BxzqUjVOX4Fu-jTboO7ZLw5lEz-dwiF1PaVUvfmr94VNA0c0Ksm-vZKv_9Le-tscrMSWbWgjbJyGGigM9qf0xbUA6tjqC1nd493tw3NRc0TwHkIH4DY0wj6V_AKR_CGBTT4MlepZhU0Ny2yeKsPDOAInGuVAv-N28S6va2EFYpHSctV8xlQSyHAVghDBYagDIA6o5CMeh8" charset="UTF-8"></script><script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { colors: { qwipo: '#4F35FF', ink: '#071126' } } } }
  </script>
  <style>
    body{font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .view{display:none}.view.active{display:block}.card{transition:.18s ease}.card:hover{transform:translateY(-2px);box-shadow:0 18px 50px rgba(18,25,64,.08)}
    .nav-active{background:#F0EDFF;color:#4F35FF}.chip{font-size:12px;padding:4px 10px;border-radius:999px}.modal-bg{background:rgba(0,0,0,.42)}
  </style>
</head>
<body class="bg-white text-ink">
<div class="min-h-screen flex">
  <aside class="w-72 border-r border-slate-200 p-6 hidden lg:flex flex-col fixed inset-y-0 bg-white z-20">
    <div class="flex items-center gap-3 mb-8"><div class="w-10 h-10 rounded-2xl border-[5px] border-qwipo"></div><div><div class="font-black text-lg">Qwipo</div><div class="text-xs text-slate-500">Resource Hub</div></div></div>
    <nav id="nav" class="space-y-1 text-sm font-semibold"></nav>
    <div class="mt-auto rounded-2xl bg-violet-50 border border-violet-100 p-5"><div class="font-black text-qwipo">Smart Search</div><p class="text-sm text-slate-600 mt-2">Search docs, videos, Figma, APIs, owners and decisions.</p><button onclick="focusSearch()" class="mt-4 w-full bg-qwipo text-white rounded-xl px-4 py-3 font-bold">Search Now →</button></div>
  </aside>
  <main class="lg:ml-72 flex-1 p-5 md:p-9">
    <header class="flex flex-col xl:flex-row xl:items-center xl:justify-between gap-5">
      <div><h1 class="text-3xl md:text-4xl font-black tracking-tight">Qwipo Resource Hub</h1><p class="text-slate-600 mt-2">One place for products, features, integrations, customer context and decisions.</p></div>
      <div class="flex items-center gap-5"><button onclick="openAdd()" class="px-5 py-3 border border-qwipo text-qwipo rounded-xl font-bold hover:bg-violet-50">+ Add Resource</button><div id="peopleBar" class="hidden md:flex items-center gap-5"></div><button onclick="toastMsg('Notifications opened')" class="relative w-12 h-12 rounded-full border grid place-items-center">🔔<span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs w-5 h-5 rounded-full grid place-items-center">3</span></button></div>
    </header>
    <section class="mt-7 flex gap-3"><div class="relative flex-1"><span class="absolute left-5 top-4 text-slate-400">⌕</span><input id="search" oninput="searchAll()" class="w-full border border-slate-200 rounded-2xl py-4 pl-12 pr-4 outline-none focus:ring-4 focus:ring-violet-100 focus:border-qwipo" placeholder="Search anything... MOQ, DMS, ITC, Figma, API, Seller Portal" /></div><button onclick="openFilters()" class="px-5 rounded-2xl border border-slate-200 hover:bg-slate-50">Filters</button></section>
    <div id="loader" class="hidden mt-5 text-qwipo font-bold">Searching resources...</div>
    <section id="home" class="view active mt-8"><div id="stats" class="grid grid-cols-2 md:grid-cols-4 xl:grid-cols-7 gap-5"></div><div class="mt-7 rounded-3xl border border-slate-200 p-5 md:p-6"><div class="flex items-center justify-between"><div class="flex gap-7 border-b border-slate-200 flex-1"><button onclick="switchTab('recent')" id="tab-recent" class="pb-4 font-black text-qwipo border-b-2 border-qwipo">Recent Resources</button><button onclick="switchTab('viewed')" id="tab-viewed" class="pb-4 font-black text-slate-500">Recently Viewed</button><button onclick="switchTab('bookmarks')" id="tab-bookmarks" class="pb-4 font-black text-slate-500">Bookmarks</button></div><button onclick="openList('all','All Resources')" class="text-qwipo font-bold ml-4">View all →</button></div><div id="table" class="mt-3"></div></div><h2 class="mt-7 text-xl font-black">Browse by top level areas</h2><div id="areas" class="grid md:grid-cols-2 xl:grid-cols-5 gap-5 mt-4"></div><div class="grid xl:grid-cols-2 gap-5 mt-7"><div class="rounded-3xl border border-slate-200 p-6"><h3 class="text-xl font-black">Decision Log</h3><div id="decisionPreview" class="mt-4 space-y-3"></div></div><div class="rounded-3xl border border-slate-200 p-6"><h3 class="text-xl font-black">Owner Health</h3><div id="ownerHealth" class="mt-4 space-y-3"></div></div></div></section>
    <section id="list" class="view mt-8"></section><section id="detail" class="view mt-8"></section><section id="dashboard" class="view mt-8"></section>
  </main>
</div>
<div id="modal" class="hidden fixed inset-0 modal-bg z-50 items-center justify-center p-4"><div class="bg-white rounded-3xl max-w-2xl w-full p-6 shadow-2xl max-h-[90vh] overflow-auto"><div class="flex justify-between items-center"><h3 id="modalTitle" class="text-2xl font-black"></h3><button onclick="closeModal()" class="text-3xl">×</button></div><div id="modalBody" class="mt-5"></div></div></div>
<div id="toastBox" class="hidden fixed bottom-6 right-6 bg-ink text-white px-5 py-3 rounded-xl shadow-2xl z-50"></div>
<script>
const people=['Siva Mamidi','Moris','Sandeep Kaushik','Omkar'];
const navItems=[['home','⌂','Home'],['dashboard','◎','Dashboard'],['products','□','Products'],['features','▦','Features'],['integrations','🔗','Integrations'],['customers','👥','Customers'],['processes','⌘','Processes'],['architecture','▱','Architecture'],['decisions','▤','Decision Log'],['bookmarks','♡','Bookmarks'],['recent','◷','Recently Viewed']];
const cats=[['products','📦','Products',8],['integrations','🔗','Integrations',27],['customers','👥','Customers',18],['features','▦','Features',142],['processes','⌘','Processes',23],['architecture','▱','Architecture',12],['decisions','▤','Decision Log',45]];
const topAreas=[['buyer-app','📱','Buyer App','Ordering, catalog, cart, payments & more',32],['seller-portal','🏬','Seller Portal','My SKU, pricing, orders, companies & more',28],['logistics','🚚','Logistics','NDD, tracking, delivery flow & exceptions',24],['ondc','🌐','ONDC','ONDC flows, schema, mapping & configs',18],['integrations-area','🔗','Integrations','DMS, ERP, payments, APIs & webhooks',27]];
let resources=[
{title:'DMS Integration – API Documentation',subtitle:'Complete API docs for DMS integration',type:'Document',category:'Integrations',owner:'Siva Mamidi',updated:'2h ago',area:'integrations-area',status:'Verified',link:'https://docs.google.com/document/d/example-dms-api',icon:'📄',tags:['API','DMS','Webhook'],related:['Inventory Sync','Order Sync','ERP']},
{title:'Retailer App – Latest Figma Design',subtitle:'UI/UX design files and prototypes',type:'Design',category:'Buyer App',owner:'Moris',updated:'5h ago',area:'buyer-app',status:'Draft',link:'https://figma.com/file/example-retailer-app',icon:'🎨',tags:['Figma','UX','Ordering'],related:['Cart','Checkout','MOQ']},
{title:'Retailer Ordering Flow – Walkthrough',subtitle:'Step by step ordering flow demo',type:'Video',category:'Buyer App',owner:'Sandeep Kaushik',updated:'1d ago',area:'buyer-app',status:'Verified',link:'https://www.loom.com/share/example-retailer-ordering',icon:'▶️',tags:['Video','Training','Ordering'],related:['Cart','Payments','Catalog']},
{title:'ITC – Beat Mapping Logic',subtitle:'Logic and rules for beat mapping',type:'Sheet',category:'Customers',owner:'Omkar',updated:'1d ago',area:'logistics',status:'Verified',link:'https://docs.google.com/spreadsheets/d/example-itc-beat',icon:'📊',tags:['ITC','Beat','Logistics'],related:['NDD','Distributor','Retailer']},
{title:'Seller Portal – My SKU Guide',subtitle:'Complete guide for My SKU feature',type:'Document',category:'Seller Portal',owner:'Moris',updated:'2d ago',area:'seller-portal',status:'Verified',link:'https://docs.google.com/document/d/example-my-sku',icon:'📘',tags:['MySKU','Seller','Pricing'],related:['SKU Sync','Company Mapping','Catalog']},
{title:'ONDC Order Lifecycle',subtitle:'Order states, callbacks and schema rules',type:'Document',category:'ONDC',owner:'Siva Mamidi',updated:'3d ago',area:'ondc',status:'Verified',link:'https://docs.google.com/document/d/example-ondc',icon:'🌐',tags:['ONDC','Schema','Callbacks'],related:['Order Sync','Buyer App','Seller App']},
{title:'Logistics NDD Flow',subtitle:'Next day delivery flow and exception handling',type:'Video',category:'Logistics',owner:'Sandeep Kaushik',updated:'4d ago',area:'logistics',status:'Needs Review',link:'https://www.loom.com/share/example-ndd',icon:'🚚',tags:['NDD','Delivery','Exceptions'],related:['Beat Planning','Routes','Orders']},
{title:'Seller Pricing Rules',subtitle:'Pricing, MOQ, MOV and retailer-level rules',type:'Decision',category:'Seller Portal',owner:'Omkar',updated:'6d ago',area:'seller-portal',status:'Verified',link:'https://docs.google.com/document/d/example-pricing',icon:'💰',tags:['MOQ','MOV','Pricing'],related:['Checkout','Offers','Cart']}];
const decisions=[['20 May','MOQ will apply after offers and discounts','Siva Mamidi'],['18 May','ITC beat planning logic change approved','Omkar'],['15 May','DMS Integration will support two-way inventory sync','Siva Mamidi'],['11 May','Seller portal company mapping will control SKU sync','Moris']];
let bookmarks=[resources[0],resources[4]], viewed=[resources[2],resources[0],resources[4]];
function init(){renderNav();renderPeople();renderStats();renderAreas();renderTable(resources);renderDecisions();renderOwners();renderDashboard()}init();
function renderNav(){nav.innerHTML=navItems.map(n=>`<button onclick="navClick('${n[0]}')" id="nav-${n[0]}" class="nav-btn w-full flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-slate-50 ${n[0]=='home'?'nav-active':''}"><span>${n[1]}</span>${n[2]}</button>`).join('')}
function renderPeople(){peopleBar.innerHTML=people.map(p=>`<button onclick="filterOwner('${p}')" class="text-center"><div class="w-12 h-12 rounded-full bg-slate-900 text-white grid place-items-center font-bold mx-auto">${initials(p)}</div><div class="mt-1 text-xs">${p}</div></button>`).join('')}
function renderStats(){stats.innerHTML=cats.map(c=>`<button onclick="openList('${c[0]}','${c[2]}')" class="card text-left rounded-2xl border border-slate-200 p-5 hover:border-qwipo"><div class="text-3xl">${c[1]}</div><div class="mt-4 font-black text-lg">${c[2]}</div><div class="text-3xl font-black mt-2">${c[3]}</div><div class="text-qwipo text-sm mt-3">View all →</div></button>`).join('')}
function renderAreas(){areas.innerHTML=topAreas.map(a=>`<button onclick="openArea('${a[0]}')" class="card text-left rounded-2xl border border-slate-200 p-5 flex gap-4 items-center"><div class="w-12 h-12 rounded-xl bg-violet-50 grid place-items-center text-2xl">${a[1]}</div><div class="flex-1"><div class="font-black">${a[2]}</div><div class="text-sm text-slate-600 mt-1">${a[3]}</div><div class="text-sm mt-3">${a[4]} Resources</div></div><div>→</div></button>`).join('')}
function renderTable(data){table.innerHTML=`<div class="hidden md:grid grid-cols-7 gap-4 px-2 py-3 text-sm text-slate-500 border-b"><div class="col-span-2">Title</div><div>Type</div><div>Category</div><div>Owner</div><div>Status</div><div>Access</div></div>`+(data.map(r=>row(r)).join('')||empty())}
function row(r){return `<div class="grid md:grid-cols-7 gap-4 items-center px-2 py-4 border-b last:border-b-0 hover:bg-slate-50 rounded-xl"><button onclick="openDetail(${resources.indexOf(r)})" class="col-span-2 flex items-center gap-4 text-left"><div class="w-11 h-11 rounded-xl bg-slate-100 grid place-items-center">${r.icon}</div><div><div class="font-black">${r.title}</div><div class="text-sm text-slate-600">${r.subtitle}</div></div></button><div><span class="chip bg-red-50 text-red-600">${r.type}</span></div><div><span class="chip bg-blue-50 text-blue-700">${r.category}</span></div><button onclick="filterOwner('${r.owner}')" class="flex items-center gap-2 text-left"><span class="w-8 h-8 rounded-full bg-slate-900 text-white grid place-items-center text-xs">${initials(r.owner)}</span>${r.owner}</button><div><span class="chip ${statusClass(r.status)}">${r.status}</span></div><div class="flex gap-4 text-qwipo"><a href="${r.link}" target="_blank">↗</a><button onclick="copyLink('${r.link}')">🔖</button><button onclick="openDetail(${resources.indexOf(r)})">⋯</button></div></div>`}
function statusClass(s){return s=='Verified'?'bg-green-50 text-green-700':s=='Draft'?'bg-yellow-50 text-yellow-700':'bg-orange-50 text-orange-700'}
function navClick(id){if(id=='home')return goHome();if(id=='dashboard')return showDashboard();if(id=='bookmarks')return showList('Bookmarks',bookmarks);if(id=='recent')return showList('Recently Viewed',viewed);let c=cats.find(x=>x[0]==id);openList(id,c?c[2]:id)}
function setActive(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('nav-active'));let n=document.getElementById('nav-'+id);if(n)n.classList.add('nav-active')}
function goHome(){setActive('home');home.classList.add('active')}
function showDashboard(){setActive('dashboard');dashboard.classList.add('active');renderDashboard()}
function openList(id,title){let data=resources;if(id=='integrations')data=resources.filter(r=>r.category=='Integrations'||r.area=='integrations-area');if(id=='customers')data=resources.filter(r=>r.category=='Customers');if(id=='products')data=resources.filter(r=>['Buyer App','Seller Portal','Logistics','ONDC'].includes(r.category));if(id=='decisions')data=resources.filter(r=>r.type=='Decision');showList(title,data,id)}
function openArea(area){let a=topAreas.find(x=>x[0]==area);showList(a[2],resources.filter(r=>r.area==area),area)}
function showList(title,data,id='list'){setActive(id);list.classList.add('active');list.innerHTML=`<button onclick="goHome()" class="text-qwipo font-bold mb-5">← Back</button><div class="flex flex-col md:flex-row md:items-end md:justify-between gap-4"><div><h2 class="text-3xl font-black">${title}</h2><p class="text-slate-600 mt-1">${data.length} resources with direct shareable links.</p></div><button onclick="openAdd()" class="bg-qwipo text-white px-5 py-3 rounded-xl font-bold">+ Add Resource</button></div><div class="grid lg:grid-cols-2 gap-5 mt-6">${data.map(r=>resourceCard(r)).join('')||empty()}</div>`}
function resourceCard(r){return `<div class="card border border-slate-200 rounded-3xl p-5"><div class="flex gap-4"><div class="w-12 h-12 rounded-xl bg-slate-100 grid place-items-center text-xl">${r.icon}</div><div class="flex-1"><h3 class="font-black">${r.title}</h3><p class="text-sm text-slate-600 mt-1">${r.subtitle}</p><div class="flex flex-wrap gap-2 mt-4">${r.tags.map(t=>`<span class="chip bg-slate-100">${t}</span>`).join('')}<span class="chip bg-violet-50 text-qwipo">${r.owner}</span></div><div class="mt-5 flex flex-wrap gap-3"><a href="${r.link}" target="_blank" class="bg-qwipo text-white px-4 py-2 rounded-xl font-bold">Open Link</a><button onclick="copyLink('${r.link}')" class="border px-4 py-2 rounded-xl">Copy</button><button onclick="openDetail(${resources.indexOf(r)})" class="border px-4 py-2 rounded-xl">Details</button></div></div></div></div>`}
function openDetail(i){let r=resources[i];viewed.unshift(r);viewed=[...new Set(viewed)];setActive('detail');detail.classList.add('active');detail.innerHTML=`<button onclick="goHome()" class="text-qwipo font-bold mb-5">← Back</button><div class="rounded-3xl border border-slate-200 p-8"><div class="flex flex-col xl:flex-row xl:items-start xl:justify-between gap-6"><div><div class="text-5xl mb-4">${r.icon}</div><h2 class="text-3xl font-black">${r.title}</h2><p class="text-slate-600 mt-2">${r.subtitle}</p></div><div class="flex flex-wrap gap-3"><a href="${r.link}" target="_blank" class="bg-qwipo text-white px-5 py-3 rounded-xl font-bold">Open Direct Link</a><button onclick="copyLink('${r.link}')" class="border px-5 py-3 rounded-xl">Copy Link</button><button onclick="toggleBookmark(${i})" class="border px-5 py-3 rounded-xl">Bookmark</button></div></div><div class="grid md:grid-cols-5 gap-4 mt-8">${info('Type',r.type)}${info('Category',r.category)}${info('Owner',r.owner)}${info('Updated',r.updated)}${info('Status',r.status)}</div><div class="grid xl:grid-cols-3 gap-5 mt-8"><div class="xl:col-span-2 rounded-2xl bg-slate-50 p-5"><h3 class="font-black text-xl">What this contains</h3><p class="mt-3 text-slate-700">This page acts as the single source of truth. The direct link can be shared with internal teams or external stakeholders based on access permission.</p><div class="mt-5 p-4 rounded-xl bg-white border break-all">${r.link}</div></div><div class="rounded-2xl bg-violet-50 p-5"><h3 class="font-black text-xl">Related Context</h3><div class="mt-4 flex flex-wrap gap-2">${r.related.map(x=>`<button onclick="fakeRelated('${x}')" class="chip bg-white text-qwipo border border-violet-100">${x}</button>`).join('')}</div></div></div></div>`}
function info(k,v){return `<div class="bg-slate-50 p-4 rounded-2xl"><div class="text-sm text-slate-500">${k}</div><b>${v}</b></div>`}
function renderDecisions(){decisionPreview.innerHTML=decisions.map(d=>`<button onclick="showDecision('${d[1]}','${d[0]}','${d[2]}')" class="w-full text-left flex gap-4 border-b last:border-b-0 pb-3"><div class="text-sm text-slate-500 w-16">${d[0]}</div><div><div class="font-bold">${d[1]}</div><div class="text-sm text-slate-500">${d[2]}</div></div></button>`).join('')}
function renderOwners(){ownerHealth.innerHTML=people.map(p=>{let c=resources.filter(r=>r.owner==p).length;return `<button onclick="filterOwner('${p}')" class="w-full flex items-center justify-between p-3 rounded-xl hover:bg-slate-50"><div class="flex items-center gap-3"><span class="w-9 h-9 rounded-full bg-slate-900 text-white grid place-items-center text-xs">${initials(p)}</span><b>${p}</b></div><span class="chip bg-violet-50 text-qwipo">${c} resources</span></button>`}).join('')}
function renderDashboard(){dashboard.innerHTML=`<button onclick="goHome()" class="text-qwipo font-bold mb-5">← Back</button><h2 class="text-3xl font-black">Admin Dashboard</h2><p class="text-slate-600 mt-1">Resource health, ownership, freshness and governance.</p><div class="grid md:grid-cols-4 gap-5 mt-6">${info('Total Resources',resources.length)}${info('Verified',resources.filter(r=>r.status=='Verified').length)}${info('Needs Review',resources.filter(r=>r.status=='Needs Review').length)}${info('Owners',people.length)}</div><div class="grid xl:grid-cols-2 gap-5 mt-6"><div class="rounded-3xl border p-6"><h3 class="font-black text-xl">By Owner</h3><div class="mt-4">${people.map(p=>`<div class="mb-4"><div class="flex justify-between text-sm"><b>${p}</b><span>${resources.filter(r=>r.owner==p).length}</span></div><div class="h-2 bg-slate-100 rounded-full mt-2"><div class="h-2 bg-qwipo rounded-full" style="width:${resources.filter(r=>r.owner==p).length*22}%"></div></div></div>`).join('')}</div></div><div class="rounded-3xl border p-6"><h3 class="font-black text-xl">Governance Rules</h3><ul class="mt-4 space-y-3 text-slate-700"><li>Every resource must have owner.</li><li>External-facing resources must be Verified.</li><li>Every integration must include API doc, sample payload and owner.</li><li>Every product area must have PRD, Figma and demo video.</li></ul></div></div>`}
function switchTab(tab){['recent','viewed','bookmarks'].forEach(t=>document.getElementById('tab-'+t).className='pb-4 font-black text-slate-500');document.getElementById('tab-'+tab).className='pb-4 font-black text-qwipo border-b-2 border-qwipo';renderTable(tab=='recent'?resources:tab=='viewed'?viewed:bookmarks)}
function searchAll(){let q=search.value.toLowerCase().trim();if(!q){renderTable(resources);return}loader.classList.remove('hidden');setTimeout(()=>{loader.classList.add('hidden');let data=resources.filter(r=>Object.values(r).flat().join(' ').toLowerCase().includes(q));renderTable(data)},250)}
function filterOwner(owner){showList(owner+"'s Resources",resources.filter(r=>r.owner==owner),'owner')}
function openAdd(){showModal('Add Resource',`<div class="grid gap-3"><input id="newTitle" class="border rounded-xl p-3" placeholder="Resource title"><input id="newLink" class="border rounded-xl p-3" placeholder="Google Drive / Figma / Loom / API link"><select id="newArea" class="border rounded-xl p-3"><option value="buyer-app">Buyer App</option><option value="seller-portal">Seller Portal</option><option value="logistics">Logistics</option><option value="ondc">ONDC</option><option value="integrations-area">Integrations</option></select><select id="newOwner" class="border rounded-xl p-3">${people.map(p=>`<option>${p}</option>`).join('')}</select><button onclick="saveResource()" class="bg-qwipo text-white px-5 py-3 rounded-xl font-bold">Save Resource</button></div>`)}
function saveResource(){let title=newTitle.value||'New Resource';let link=newLink.value||'https://docs.google.com/document/d/new-resource';let area=newArea.value;let owner=newOwner.value;let areaObj=topAreas.find(a=>a[0]==area);resources.unshift({title,subtitle:'Newly added resource',type:'Document',category:areaObj[2],owner,updated:'Just now',area,status:'Draft',link,icon:'📄',tags:['New'],related:['PRD','Figma','Video']});closeModal();renderTable(resources);renderDashboard();renderOwners();toastMsg('Resource added')}
function openFilters(){showModal('Filters',`<div class="grid md:grid-cols-2 gap-3">${['Document','Design','Video','Sheet','Decision'].map(t=>`<button onclick="applyType('${t}')" class="border rounded-xl p-3 text-left">${t}</button>`).join('')}</div>`)}
function applyType(t){closeModal();showList(t+' Resources',resources.filter(r=>r.type==t),'list')}
function copyLink(link){navigator.clipboard.writeText(link);toastMsg('Link copied')}
function toggleBookmark(i){if(!bookmarks.includes(resources[i]))bookmarks.push(resources[i]);toastMsg('Bookmarked')}
function showDecision(t,d,o){showModal('Decision Detail',`<div class="space-y-2"><b>${t}</b><p>Date: ${d}</p><p>Owner: ${o}</p><p class="text-slate-600">This decision is linked to relevant product resources and can be shared as context.</p></div>`)}
function fakeRelated(x){search.value=x;goHome();searchAll()}
function focusSearch(){goHome();search.focus();toastMsg('Search ready')}
function showModal(t,b){modalTitle.innerText=t;modalBody.innerHTML=b;modal.classList.remove('hidden');modal.classList.add('flex')}
function closeModal(){modal.classList.add('hidden');modal.classList.remove('flex')}
function toastMsg(msg){toastBox.innerText=msg;toastBox.classList.remove('hidden');setTimeout(()=>toastBox.classList.add('hidden'),1600)}
function initials(n){return n.split(' ').map(x=>x[0]).join('').slice(0,2)}function empty(){return '<div class="p-8 text-center text-slate-500">No resources found.</div>'}
</script>
</body>
</html>
